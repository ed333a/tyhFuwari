name: Check Friend Links Task

on:
  schedule:
    # 每 12 小时运行一次
    - cron: '0 */12 * * *'
  
jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送代码到 results 分支
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run friend links checker
        run: python scripts/check_friends.py -o scripts/result/result.json

      - name: Push results to pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.ACCESS_TOKEN }}
          publish_dir: ./scripts/result
          publish_branch: main
          keep_files: false   # 覆盖旧文件，只保留最新结果
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Publick links check results'